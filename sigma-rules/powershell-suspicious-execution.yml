title: Suspicious PowerShell Execution Pattern
id: 8f2c3b7d-6a6d-4b9f-9c2e-1a9c2d5f7a11
status: experimental
description: Detects suspicious PowerShell execution patterns commonly used in malicious activity.
author: Stacey Menley

logsource:
  product: windows
  category: process_creation

detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - " -enc "
      - " -encodedcommand "
      - "IEX"
      - "Invoke-Expression"
      - "DownloadString"
      - "WebClient"

  condition: selection

falsepositives:
  - Administrative PowerShell scripts
  - IT automation tools

level: high

tags:
  - attack.execution
  - attack.t1059.001
  - attack.command_and_control
  - attack.t1105
