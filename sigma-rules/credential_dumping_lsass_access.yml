title: Potential LSASS Credential Dumping via Process Access
id: 3c1a9d6f-2b7e-4f3a-9c11-7b2d4f8a91c2
status: experimental
description: Detects potential credential dumping activity targeting LSASS process memory access.
author: Stacey Menley

logsource:
  product: windows
  category: process_access

detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - "0x1fffff"
      - "0x143a"
      - "0x1410"

  condition: selection

falsepositives:
  - Antivirus or EDR security tools
  - Legitimate system monitoring tools

level: critical

tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
